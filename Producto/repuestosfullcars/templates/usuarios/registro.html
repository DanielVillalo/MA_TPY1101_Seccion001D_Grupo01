{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Full Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/registro.css' %}">
</head>
<body>

<div class="register-container">
    <div class="logo-section">
        <div class="icon-circle">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1>Únete a RepuestosFullCars</h1>
        <p>Crea tu cuenta en segundos</p>
    </div>

    <!-- El método POST y el csrf_token son obligatorios para guardar datos -->
    <form class="form-section" method="POST">
        {% csrf_token %}
        
        <!-- Mensajes de error de Django (ej: usuario ya existe) -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger p-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="custom-input-group mb-3">
            <label class="form-label fw-bold">Nombre de Usuario</label>
            <input type="text" name="username" class="form-control custom-input" placeholder="Ej: dani_v" required>
        </div>

        <div class="custom-input-group mb-3">
            <label class="form-label fw-bold">Correo electrónico</label>
            <input type="email" name="email" class="form-control custom-input" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="custom-input-group mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <div class="input-group">
                <input type="password" name="password" id="pass1" class="form-control custom-input" placeholder="Mínimo 6 caracteres" required>
                <button class="btn btn-outline-secondary toggle-password" type="button" onclick="toggle('pass1', 'icon1')">
                    <i class="far fa-eye" id="icon1"></i>
                </button>
            </div>
        </div>

        <div class="custom-input-group mb-3">
            <label class="form-label fw-bold">Confirmar contraseña</label>
            <div class="input-group">
                <input type="password" name="confirmPassword" id="pass2" class="form-control custom-input" placeholder="Repite tu contraseña" required>
                <button class="btn btn-outline-secondary toggle-password" type="button" onclick="toggle('pass2', 'icon2')">
                    <i class="far fa-eye" id="icon2"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="register-button w-100">
            Crear Cuenta
        </button>
    </form>

    <div class="login-section">
        <p>¿Ya tienes cuenta?</p>
        <a href="{% url 'login' %}" class="login-link">Iniciar Sesión</a>
    </div>
</div>

<script>
    function toggle(id, iconId) {
        const input = document.getElementById(id);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
