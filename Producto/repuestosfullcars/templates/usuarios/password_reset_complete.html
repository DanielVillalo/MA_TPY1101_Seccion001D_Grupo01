{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida - Full Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <style>
        body { background-color: #f5f5dc; }
        .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .content-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 0 50px; }
    </style>
</head>
<body>
<div class="main-wrapper">
    {% include 'navbar.html' %}
    <div class="content-area">
        <div class="login-container">
            <div class="logo-section">
                <div class="icon-circle" style="background-color: #28a745;">
                    <i class="fas fa-check-circle" style="font-size: 50px; color: white;"></i>
                </div>
                <h1>¡Listo!</h1>
                <p>Tu contraseña fue restablecida</p>
            </div>
            <div class="form-section text-center">
                <p class="text-muted">Ya puedes iniciar sesión con tu nueva contraseña.</p>
                <a href="{% url 'login' %}" class="login-button w-100 mt-3 d-block text-center text-decoration-none">
                    Ir al Login
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
