{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Full Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <style>
        body { background-color: #f5f5dc; }
        .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .content-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 0 50px; }
    </style>
</head>
<body>
<div class="main-wrapper">
    {% include 'navbar.html' %}
    <div class="content-area">
        <div class="login-container">
            <div class="logo-section">
                <div class="icon-circle">
                    <i class="fas fa-key" style="font-size: 50px; color: white;"></i>
                </div>
                <h1>Recuperar Contraseña</h1>
                <p>Te enviaremos un enlace a tu correo</p>
            </div>

            <form class="form-section" method="POST">
                {% csrf_token %}
                <div class="custom-input-group">
                    <label class="form-label fw-bold">Correo electrónico</label>
                    <input type="email" name="email" class="form-control custom-input"
                           placeholder="Tu correo registrado" required>
                    {% if form.email.errors %}
                        <div class="text-danger small mt-1">{{ form.email.errors|striptags }}</div>
                    {% endif %}
                </div>
                <button type="submit" class="login-button w-100 mt-4">
                    Enviar enlace de recuperación
                </button>
            </form>

            <div class="separator"><span>o</span></div>
            <div class="register-section">
                <a href="{% url 'login' %}" class="btn register-button w-100">
                    Volver al Login
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
