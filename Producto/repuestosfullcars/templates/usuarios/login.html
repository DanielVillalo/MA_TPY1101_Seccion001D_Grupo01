{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Full Cars</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <style>
        /* Fondo crema global */
        body {
            background-color: #f5f5dc;
            margin: 0;
        }

        /* Contenedor principal para empujar el footer al fondo */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Espacio para el contenido central */
        .content-area {
            flex: 1 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 0 50px 0; /* Margen superior para el Navbar fijo */
        }

        /* Ajuste para que el footer ocupe todo el ancho */
        footer {
            width: 100%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    {% include 'navbar.html' %}

    <div class="content-area">
        <div class="login-container">
            <div class="logo-section">
                <div class="icon-circle">
                    <i class="fas fa-car-side" style="font-size: 50px; color: white;"></i>
                </div>
                <h1>Repuestos Full Cars</h1>
                <p>Bienvenido</p>
            </div>

            <form class="form-section" method="POST">
                {% csrf_token %}
                <div class="custom-input-group">
                    <label class="form-label fw-bold">Usuario</label>
                    <input type="text" name="username" class="form-control custom-input" placeholder="Tu nombre de usuario" required>
                </div>

                <div class="custom-input-group mt-3">
                    <label class="form-label fw-bold">Contraseña</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control custom-input" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-button w-100 mt-4">Iniciar Sesión</button>
            </form>

            <div class="separator"><span>o</span></div>

            <div class="register-section">
                <p>¿No tienes cuenta?</p>
                <a href="{% url 'registro' %}" class="btn register-button w-100">Crear cuenta</a>
            </div>
        </div>
    </div>

</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
