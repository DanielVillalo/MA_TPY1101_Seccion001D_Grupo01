<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Repuestos Full Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #004d4d; }
        .card-img-top { height: 200px; object-fit: contain; padding: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">REPUESTOS FULL CARS</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for p in productos %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    {% if p.imagen %}
                        <img src="{{ p.imagen.url }}" class="card-img-top" alt="{{ p.nombre }}">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-success">$ {{ p.precio }}</h5>
                        <p class="card-text">{{ p.nombre }}</p>
                        <small class="text-muted">SKU: {{ p.sku }} | Stock: {{ p.stock }}</small>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <button class="btn btn-outline-dark w-100">VER MÁS</button>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <h3>Bienvenido a Repuestos Full Cars</h3>
                <p>Aún no hay productos. Agrégalos desde el <a href="/admin">Panel de Administración</a>.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
