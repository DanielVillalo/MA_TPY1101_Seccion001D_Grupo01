{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Full Cars{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/tienda.css' %}">
    
    <style>
        :root {
            --primary-teal: #02807c;
            --secondary-teal: #009199;
            --cream-bg: #f5f5dc;
            --white: #ffffff;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        body {
            background: linear-gradient(135deg, var(--cream-bg) 0%, var(--white) 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0; /* Cambiamos padding-top por margen en el main */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; /* Evita scroll horizontal accidental */
        }

        .btn-custom {
            background: linear-gradient(135deg, var(--primary-teal) 0%, var(--secondary-teal) 100%);
            color: white !important;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(2, 128, 124, 0.3);
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 128, 124, 0.5);
        }

        .custom-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            animation: fadeIn 0.6s ease-in;
            background-color: white;
        }

        a { text-decoration: none !important; }

        footer {
            width: 100% !important;
            margin: 0 !important;
        }

    </style>
</head>
<body class="flex flex-col min-h-screen"> 
    {% include 'navbar.html' %}

    <main class="container my-4 flex-grow"> 
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}
    {% include 'asistente_widget.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
