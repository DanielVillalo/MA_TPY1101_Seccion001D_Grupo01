databases:
  - name: full-cars-db-pruebas
    plan: free

services:
  - type: web
    name: full-cars-pruebas
    runtime: python
    plan: free
    rootDir: Producto
    buildCommand: bash build.sh
    startCommand: gunicorn full_cars.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DATABASE_URL
        fromDatabase:
          name: full-cars-db-pruebas
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: full-cars-pruebas.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://full-cars-pruebas.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
